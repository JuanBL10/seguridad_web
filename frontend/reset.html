<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
    <title>Reset contra</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link href="./css/estilos.css" rel="stylesheet" />
</head>

<body>
    <header>
        <!-- place navbar here -->
    </header>
    <main class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="row justify-content-center w-100">
            <div class="col-12 col-sm-10 col-md-7 col-lg-5">

                <section class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">

                        <div class="text-center mb-4">
                            <h1 class="h3 mb-2">Restablecer contraseña</h1>

                            <p class="text-secondary mb-0">
                                Ingrese y confirme su nueva contraseña.
                            </p>
                        </div>

                        <div id="mensajeReset" class="alert alert-primary mt-3 mb-3" role="alert"></div>

                        <form id="formReset" novalidate>
                            <div class="mb-3">
                                <label for="resetToken" class="form-label">
                                    Token de recuperación
                                </label>

                                <input type="text" class="form-control" id="resetToken" readonly>
                            </div>

                            <div class="mb-3">
                                <label for="resetPassword" class="form-label">
                                    Nueva contraseña
                                </label>

                                <input type="password" class="form-control" id="resetPassword"
                                    placeholder="Mínimo 6 caracteres">
                            </div>

                            <div class="mb-4">
                                <label for="resetConfirmarPassword" class="form-label">
                                    Confirmar nueva contraseña
                                </label>

                                <input type="password" class="form-control" id="resetConfirmarPassword"
                                    placeholder="Repita la contraseña">
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Cambiar contraseña
                            </button>
                        </form>

                        <hr class="my-4">

                        <div class="text-center">
                            <a href="index.html">
                                Volver al inicio de sesión
                            </a>
                        </div>

                    </div>
                </section>

            </div>
        </div>
        <!-- jQuery en local -->
        <script src="./js/jquery/jquery-4.0.0.min.js"></script>

        <!-- JavaScript para controllar el DOM-->
        <script src="./js/app.js"></script>
    </main>
    <footer>
        <!-- place footer here -->
    </footer>
    <!-- Bootstrap JavaScript Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
