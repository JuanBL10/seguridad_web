<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
    <title>Login</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link href="./css/estilos.css" rel="stylesheet" />
</head>

<body>
    <header>
        <!-- place navbar here -->
    </header>
    <main class="container min-vh-100 d-flex align-items-center justify-content-center">
        
        <div class="row justify-content-center w-100">
            <div class="col-12 col-sm-10 col-md-7 col-lg-5">

                <section class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">

                        <div class="text-center mb-4">
                            <h1 class="h3 mb-2">Seguridad Web</h1>

                            <p class="text-secondary mb-0">
                                Inicia sesión con tu cuenta.
                            </p>
                        </div>

                        <!-- Aquí aparecerán los mensajes -->
                        <div
                            id="mensajeLogin"
                            class="alert alert-primary mt-3 mb-0"
                            role="alert"
                        ></div>

                        <form id="formLogin" novalidate>
                            <div class="mb-3">
                                <label for="loginCorreo" class="form-label">
                                    Correo electrónico
                                </label>

                                <input
                                    type="email"
                                    class="form-control"
                                    id="loginCorreo"
                                    placeholder="correo@ejemplo.com"
                                >
                            </div>

                            <div class="mb-4">
                                <label for="loginPassword" class="form-label">
                                    Contraseña
                                </label>

                                <input
                                    type="password"
                                    class="form-control"
                                    id="loginPassword"
                                    placeholder="Ingrese su contraseña"
                                >
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Iniciar sesión
                            </button>
                        </form>

                        <hr class="my-4">

                        <div class="text-center">
                            <a href="recuperar.html" class="d-block mb-2">
                                ¿Olvidaste tu contraseña?
                            </a>

                            <span class="text-secondary">
                                ¿No tienes una cuenta?
                            </span>

                            <a href="registro.html">
                                Regístrate
                            </a>
                        </div>

                    </div>
                </section>

            </div>
        </div>

        <!-- jQuery en local -->
        <script src="./js/jquery/jquery-4.0.0.min.js"></script>

        <!-- JavaScript para controllar el DOM-->
        <script src="./js/app.js"></script>
    </main>
    <footer>
        <!-- place footer here -->
    </footer>
    <!-- Bootstrap JavaScript Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
